services:
  - type: web
    name: trackit-api
    env: docker
    plan: free
    rootDir: server
    dockerfilePath: ./Dockerfile
    envVars:
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
  - type: web
    name: trackit-web
    env: docker
    plan: free
    rootDir: client
    dockerfilePath: ./Dockerfile
    envVars:
      - key: VITE_API_URL
        sync: false
